{{define "title"}}Home{{end}} {{define "main"}} {{if .IsAuthenticated}}
<form class="todo-create" action="/todo/create" method="post">
  <input
    type="text"
    name="title"
    placeholder="Enter todo title"
    required
    minlength="1"
  />
  <button class="info" type="submit">Add Todo</button>
</form>
{{end}}
<ul class="todos">
  {{range .Todos}}
  <li class="todos-item">
    <span>{{.Title}}</span>
    <span>{{humanDate .Created}}</span>
    <span role="status">{{if .Completed}}Completed{{else}}In progress{{end}}</span>
    <div class="button-container">
      <form action="/todo/complete/{{.ID}}" method="post">
        <button
          class="info"
          type="submit"
          aria-label="Mark todo as complete: {{.Title}}"
          {{if .Completed}}disabled{{end}}
        >
          Complete
        </button>
      </form>
      <form action="/todo/delete/{{.ID}}" method="post">
        <button class="icon delete" aria-label="Delete todo">
          <svg class="icon-md" aria-hidden="true">
            <use href="/static/icons/sprite.svg#trash"></use>
          </svg>
        </button>
      </form>
    </div>
  </li>
  {{end}}
</ul>
{{end}}
